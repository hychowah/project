# Site settings
title: Eric Chow
subtitle: "Mechanical · Embedded · Software"
description: >-
  Portfolio of Eric Chow — robotics engineer building full-stack autonomous systems,
  from custom PCBs to LLM-driven intelligence.
url: "https://hychowah.github.io"
baseurl: ""

# Theme
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "dark"

sass:
  style: compressed

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-include-cache
  - jekyll-remote-theme

# Author
author:
  name: "Eric Chow"
  bio: >-
    Robotics engineer with full-stack experience across hardware, embedded,
    and software — giving me a system-level perspective on how things fit together.
  location: "Hong Kong"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:hychowah@gmail.com"

# Footer
footer:
  links: []

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:path/

# Defaults
defaults:
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
  # _projects
  - scope:
      path: ""
      type: projects
    values:
      layout: single
      author_profile: false
      share: false
# Reading
encoding: "utf-8"

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - vendor
